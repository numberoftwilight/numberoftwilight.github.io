<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight Perfume | Memory of Wind</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Pretendard:wght@200;300;400;500&display=swap');
    </style>

    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #050408, #160a17, #24121e, #080a12);
            background-size: 300% 300%;
            animation: breath 15s ease-in-out infinite;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden; color: white;
        }

        @keyframes breath {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .brand-header { position: absolute; top: 50px; left: 60px; z-index: 10; pointer-events: none; }
        .brand-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 10px; font-weight: 400; margin: 0; color: #ebd5c1; }
        .brand-header p { font-size: 11px; letter-spacing: 5px; opacity: 0.4; margin-top: 12px; font-weight: 200; }

        .search-container { position: absolute; top: 50px; right: 60px; z-index: 10; display: flex; gap: 10px; align-items: center; }
        .search-input { background: rgba(10, 5, 12, 0.5); border: 1px solid rgba(235, 213, 193, 0.3); border-radius: 2px; padding: 8px 15px; color: #ebd5c1; font-family: 'Pretendard', sans-serif; font-size: 12px; letter-spacing: 1px; width: 150px; outline: none; transition: 0.3s; backdrop-filter: blur(5px); }
        .search-input:focus { border-color: #ebd5c1; width: 180px; }
        .search-btn { background: transparent; border: 1px solid rgba(235, 213, 193, 0.3); color: #ebd5c1; padding: 8px 15px; cursor: pointer; border-radius: 2px; font-family: 'Playfair Display', serif; font-size: 12px; letter-spacing: 2px; transition: 0.3s; }
        .search-btn:hover { background: rgba(235, 213, 193, 0.1); border-color: #ebd5c1; }

        #globeViz { width: 100vw; height: 100vh; }

        .scene-tooltip { background: rgba(10, 5, 12, 0.8) !important; backdrop-filter: blur(15px) !important; border: 1px solid rgba(235, 213, 193, 0.3) !important; border-radius: 4px !important; padding: 16px 20px !important; pointer-events: none; }

        /* 🎬 비디오 팝업 */
        #videoModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85vw; max-width: 1200px; height: auto; 
            background: rgba(10, 5, 12, 0.95); backdrop-filter: blur(40px);
            border: 1px solid rgba(235, 213, 193, 0.2); z-index: 1000;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
            padding: 40px; border-radius: 8px;
        }

        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 13px; letter-spacing: 3px; cursor: pointer; opacity: 0.5; transition: 0.3s ease; z-index: 10; font-family: 'Pretendard', sans-serif; }
        .close-btn:hover { opacity: 1; color: #ebd5c1; }

        /* 레이아웃 */
        .modal-layout { display: flex; width: 100%; align-items: center; gap: 40px; }
        
        /* 🔥 여기를 완벽하게 고쳤습니다! (16:9 비율 강제) */
        .video-section { 
            flex: 1.5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000; /* 빈 공간은 까맣게 레터박스 처리 */
            border-radius: 4px; 
            overflow: hidden; 
        }
        
        #perfumeVideo { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 16 / 9; /* 16:9 와이드 비율 무조건 고정! */
            object-fit: contain !important; /* 원본 영상 다 보여주기! */
            outline: none; 
        }

        /* 오른쪽 정보 구역 */
        .info-section { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .modal-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 42px; margin: 0 0 10px 0; color: #ebd5c1; letter-spacing: 2px; }
        .modal-desc { letter-spacing: 2px; font-weight: 200; font-size: 13px; color: #999; margin-bottom: 50px; }

        .notes-container { display: flex; flex-direction: column; gap: 30px; }
        .note-item { display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid rgba(235, 213, 193, 0.1); padding-bottom: 15px; }
        .note-label { font-family: 'Playfair Display', serif; font-size: 12px; letter-spacing: 5px; color: #ebd5c1; opacity: 0.8; }
        .note-value { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: 300; color: #eee; letter-spacing: 1px; line-height: 1.5; }

        #youtube-bgm-player { position: absolute; width: 0; height: 0; left: -9999px; }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1>NUMBER OF TWILIGHT</h1>
        <p>SCENT OF THE WORLD GAZE</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="City or Country..." onkeypress="handleEnter(event)">
        <button class="search-btn" onclick="searchLocation()">SEARCH</button>
    </div>

    <div id="globeViz"></div>

    <div id="videoModal">
        <span class="close-btn" onclick="closeModal()">CLOSE ✕</span>
        
        <div class="modal-layout">
            <div class="video-section">
                <video id="perfumeVideo" controls autoplay>
                    <source id="videoSource" src="" type="video/mp4">
                </video>
            </div>
            
            <div class="info-section">
                <div class="modal-title" id="modalTitle">City</div>
                <div class="modal-desc" id="modalDesc">MEMORY DESC</div>
                
                <div class="notes-container">
                    <div class="note-item">
                        <span class="note-label">TOP NOTE</span>
                        <span class="note-value" id="noteTop">-</span>
                    </div>
                    <div class="note-item">
                        <span class="note-label">MIDDLE NOTE</span>
                        <span class="note-value" id="noteMiddle">-</span>
                    </div>
                    <div class="note-item">
                        <span class="note-label">BASE NOTE</span>
                        <span class="note-value" id="noteBase">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="youtube-bgm-player"></div>

    <script>
        let bgmPlayer;
        function onYouTubeIframeAPIReady() {
            bgmPlayer = new YT.Player('youtube-bgm-player', {
                height: '1', width: '1',
                playerVars: { 'autoplay': 0, 'controls': 0, 'rel': 0 },
            });
        }

        const perfumeLocations = [
            { 
                lat: 36.5613, lng: 136.6562, 
                name: 'KANAZAWA', searchKeywords: ['가나자와', '일본', 'JAPAN', 'KANAZAWA'],
                desc: '바람을 타고 오는 은은한 향', 
                memoryText: 'MEMORY 1 : KANAZAWA OF WIND', 
                videoSrc: 'KakaoTalk_20260225_175616729.mp4',
                bgmId: 'dFlDRhxR4EQ', 
                notes: {
                    top: '비에 젖은 이끼, 베르가못',
                    middle: '은은한 매화, 화이트 티',
                    base: '샌달우드, 흙내음'
                }
            },
            { 
                lat: 25.1098, lng: 121.8452, 
                name: 'JIUFEN', searchKeywords: ['지우펀', '대만', '타이완', 'TAIWAN', 'JIUFEN'],
                desc: '홍등이 수놓은 밤골목의 아련한 향', 
                memoryText: 'MEMORY 2 : TAIWAN JIUFEN', 
                videoSrc: 'Jiufen_Perfume_Ad_Cinematic_Scene.mp4',
                bgmId: 'JBGhG0M11_8',
                notes: {
                    top: '스파이시 페퍼, 만다린',
                    middle: '오리엔탈 인센스, 우롱차',
                    base: '다크 머스크, 패출리'
                }
            }
        ];

        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('rgba(0,0,0,0)')
            .showAtmosphere(true) 
            .atmosphereColor('#ebd5c1')
            .atmosphereAltitude(0.12)
            .pointsData(perfumeLocations)
            .pointAltitude(0.06)
            .pointColor(() => '#ebd5c1')
            .pointRadius(0.8)
            .pointLabel(d => `
                <div style="text-align: center; color: white;">
                    <span style="font-family: 'Playfair Display', serif; font-size:18px; letter-spacing:4px; color:#ebd5c1;">${d.name}</span><br>
                    <div style="width:1px; height:15px; background:rgba(235, 213, 193, 0.3); margin:10px auto;"></div>
                    <span style="font-family: 'Pretendard', sans-serif; font-size:11px; font-weight:200; opacity:0.7; letter-spacing:1px;">${d.desc}</span>
                </div>
            `)
            .onPointClick(d => {
                openModal(d); 
            });

        world.pointOfView({ lat: 30, lng: 130, altitude: 2.2 }); 
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.4; 

        function searchLocation() {
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            if (!query) return;

            const target = perfumeLocations.find(loc => 
                loc.searchKeywords.some(keyword => keyword.toUpperCase().includes(query))
            );

            if (target) {
                world.pointOfView({ lat: target.lat, lng: target.lng, altitude: 1.2 }, 1500);
                if (bgmPlayer && bgmPlayer.loadVideoById) {
                    bgmPlayer.loadVideoById({'videoId': target.bgmId});
                }
            } else {
                alert('아직 조향되지 않은 지역이거나 검색어를 확인해주세요. 🌙');
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') searchLocation();
        }

        const modal = document.getElementById('videoModal');
        const video = document.getElementById('perfumeVideo');
        const videoSource = document.getElementById('videoSource');

        function openModal(data) {
            if (bgmPlayer && typeof bgmPlayer.pauseVideo === 'function') {
                bgmPlayer.pauseVideo();
            }

            document.getElementById('modalTitle').innerText = data.name;
            document.getElementById('modalDesc').innerText = data.memoryText;
            document.getElementById('noteTop').innerText = data.notes.top;
            document.getElementById('noteMiddle').innerText = data.notes.middle;
            document.getElementById('noteBase').innerText = data.notes.base;

            videoSource.src = data.videoSrc;
            video.load(); 
            modal.style.display = 'block'; 
            video.play(); 
        }

        function closeModal() {
            modal.style.display = 'none';
            video.pause();
            if (bgmPlayer && typeof bgmPlayer.playVideo === 'function') {
                bgmPlayer.playVideo();
            }
        }
    </script>
</body>
</html>
