<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMBER OF TWILIGHT — Scent of the World</title>
<meta name="description" content="전 세계 도시의 기억을 담은 향수. 여행의 순간을 향으로 다시 만나다.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.46.1/dist/globe.gl.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<style>
:root{
  --ink:#07060c;
  --dusk:#150d1f;
  --champagne:#e9d3b5;
  --champagne-dim:rgba(233,211,181,.38);
  --ember:#d9925f;
  --mist:#a89fb5;
  --line:rgba(233,211,181,.16);
  --font-display:'Italiana',serif;
  --font-serif:'Cormorant Garamond',serif;
  --font-serif-kr:'Noto Serif KR','Cormorant Garamond',serif;
  --font-body:'Pretendard Variable',Pretendard,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--ink);
  color:#eee;
  font-family:var(--font-body);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── 배경 오로라 (GPU 가속: transform만 사용) ── */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;background:var(--ink);overflow:hidden}
.aurora::before,.aurora::after{
  content:"";position:absolute;inset:-30%;will-change:transform;
}
.aurora::before{
  background:
    radial-gradient(38% 30% at 72% 24%, rgba(96,52,90,.30), transparent 65%),
    radial-gradient(30% 28% at 22% 74%, rgba(43,30,72,.38), transparent 70%);
  animation:driftA 34s ease-in-out infinite alternate;
}
.aurora::after{
  background:radial-gradient(24% 22% at 52% 52%, rgba(217,146,95,.08), transparent 70%);
  animation:driftB 26s ease-in-out infinite alternate;
}
@keyframes driftA{from{transform:translate3d(-2%,-1%,0) scale(1)}to{transform:translate3d(2%,2%,0) scale(1.08)}}
@keyframes driftB{from{transform:translate3d(1%,2%,0) scale(1.05)}to{transform:translate3d(-2%,-2%,0) scale(1)}}
/* 필름 그레인 */
.grain{
  position:fixed;inset:-50%;z-index:60;pointer-events:none;opacity:.04;will-change:transform;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:grainShift 8s steps(10) infinite;
}
@keyframes grainShift{
  0%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}20%{transform:translate(3%,1%)}
  30%{transform:translate(-1%,3%)}40%{transform:translate(2%,-2%)}50%{transform:translate(-3%,1%)}
  60%{transform:translate(1%,2%)}70%{transform:translate(-2%,-1%)}80%{transform:translate(3%,3%)}
  90%{transform:translate(-1%,-2%)}100%{transform:translate(0,0)}
}
.vignette{position:fixed;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(0,0,0,.55) 100%);}

/* ── 인트로 ───────────────────────────── */
#intro{
  position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:34px;
  background:var(--ink);transition:opacity 1.4s ease, visibility 1.4s;
}
#intro.done{opacity:0;visibility:hidden;pointer-events:none}
.intro-title{
  font-family:var(--font-display);font-size:clamp(34px,6.4vw,86px);
  letter-spacing:.32em;color:var(--champagne);display:flex;flex-wrap:wrap;justify-content:center;
  padding-left:.32em; /* letter-spacing 보정 */
}
.intro-title span{opacity:0;transform:translateY(26px) rotate(2deg);filter:blur(8px);
  animation:letterIn 1.1s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay:calc(var(--i) * 70ms + 300ms);}
@keyframes letterIn{to{opacity:1;transform:none;filter:blur(0)}}
.intro-line{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--champagne),transparent);
  animation:lineGrow 1.6s ease forwards;animation-delay:1.7s}
@keyframes lineGrow{to{width:min(420px,70vw)}}
.intro-sub{
  font-family:var(--font-serif-kr);font-style:normal;font-weight:300;font-size:clamp(13px,1.7vw,18px);
  letter-spacing:.4em;color:var(--mist);opacity:0;
  animation:fadeUp 1.4s ease forwards;animation-delay:2.2s;text-align:center;padding:0 20px;
}
.intro-enter{
  margin-top:18px;background:none;border:1px solid var(--line);color:var(--champagne);
  font-family:var(--font-body);font-size:11px;letter-spacing:.5em;text-indent:.5em;
  padding:14px 38px;cursor:pointer;opacity:0;border-radius:40px;
  animation:fadeUp 1.2s ease forwards;animation-delay:3s;transition:.4s;
}
.intro-enter:hover{background:rgba(233,211,181,.08);border-color:var(--champagne);letter-spacing:.62em}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── 스테이지 (지구본 화면) ─────────────── */
#stage{opacity:0;transition:opacity 1.6s ease .2s}
#stage.show{opacity:1}
#globeViz{position:fixed;inset:0;z-index:1}

/* 헤더 */
.hud-top{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:34px 44px;pointer-events:none;
}
.brand{pointer-events:auto}
.brand h1{font-family:var(--font-display);font-size:21px;letter-spacing:.42em;color:var(--champagne);font-weight:400}
.brand p{font-size:10px;letter-spacing:.46em;color:var(--mist);margin-top:9px;opacity:.75}

.hud-right{display:flex;align-items:center;gap:14px;pointer-events:auto}

/* 사운드 토글 */
.sound-toggle{
  width:40px;height:40px;border-radius:50%;border:1px solid var(--line);
  background:rgba(7,6,12,.45);backdrop-filter:blur(8px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:2.5px;transition:.3s;
}
.sound-toggle:hover{border-color:var(--champagne)}
.sound-toggle i{display:block;width:2px;height:6px;background:var(--champagne);border-radius:2px;opacity:.5;transition:.3s}
.sound-toggle.on i{opacity:1;animation:eq 1s ease-in-out infinite}
.sound-toggle.on i:nth-child(2){animation-delay:.18s}
.sound-toggle.on i:nth-child(3){animation-delay:.36s}
@keyframes eq{0%,100%{height:5px}50%{height:13px}}

/* 검색 */
.search-wrap{position:relative}
.search-box{
  display:flex;align-items:center;gap:10px;
  background:rgba(7,6,12,.5);border:1px solid var(--line);border-radius:40px;
  padding:11px 20px;backdrop-filter:blur(12px);transition:.35s;min-width:250px;
}
.search-box:focus-within{border-color:var(--champagne);box-shadow:0 0 32px rgba(233,211,181,.12)}
.search-box svg{flex:none;opacity:.55}
.search-box input{
  flex:1;background:none;border:none;outline:none;color:var(--champagne);
  font-family:var(--font-body);font-size:13px;letter-spacing:.08em;min-width:0;
}
.search-box input::placeholder{color:rgba(168,159,181,.55)}
.suggest{
  position:absolute;top:calc(100% + 10px);left:0;right:0;
  background:rgba(10,8,16,.92);border:1px solid var(--line);border-radius:16px;
  backdrop-filter:blur(20px);overflow:hidden;display:none;
  box-shadow:0 18px 50px rgba(0,0,0,.6);
}
.suggest.open{display:block;animation:fadeUp .25s ease}
.suggest-item{display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:14px 20px;cursor:pointer;transition:.2s}
.suggest-item:hover{background:rgba(233,211,181,.07)}
.suggest-item .nm{font-family:var(--font-serif);font-style:italic;font-size:16px;color:var(--champagne);letter-spacing:.06em}
.suggest-item .cc{font-size:10px;letter-spacing:.3em;color:var(--mist)}
.suggest-empty{padding:16px 20px;font-size:12px;color:var(--mist);letter-spacing:.06em}

/* 마커 */
.marker{cursor:pointer;transform:translate(-50%,-100%);text-align:center;transition:.25s;pointer-events:auto}
.marker .ring{
  width:14px;height:14px;border-radius:50%;margin:0 auto;position:relative;
  border:1px solid var(--champagne);background:rgba(233,211,181,.16);
}
.marker .ring::after{content:"";position:absolute;inset:-7px;border-radius:50%;
  border:1px solid var(--champagne-dim);animation:markerPulse 2.4s ease-out infinite}
@keyframes markerPulse{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.9);opacity:0}}
.marker .tag{
  margin-top:10px;display:inline-block;padding:7px 14px;border-radius:30px;
  background:rgba(9,7,15,.82);border:1px solid var(--line);
  font-family:var(--font-serif);font-style:italic;font-size:14px;letter-spacing:.18em;color:var(--champagne);
  white-space:nowrap;transition:border-color .3s, box-shadow .3s;
}
.marker:hover .tag{border-color:var(--champagne);box-shadow:0 0 26px rgba(233,211,181,.22)}

/* 국가 마커 (1단계) — 도시보다 크고 진하게 */
.marker-country .ring{width:17px;height:17px;background:rgba(233,211,181,.24)}
.marker-country .tag{
  font-style:normal;font-family:var(--font-body);font-weight:600;
  font-size:13px;letter-spacing:.26em;text-indent:.26em;padding:9px 18px;
  display:flex;align-items:center;gap:9px;
}
.marker-country .tag b{font-size:15px;font-weight:400}
.marker-country .tag i{
  font-style:normal;font-size:9px;letter-spacing:.18em;color:var(--mist);
  border-left:1px solid var(--line);padding-left:9px;margin-left:2px;
}

/* ── 브레드크럼 (드릴다운 위치 표시) ── */
.breadcrumb{
  position:fixed;left:44px;top:110px;z-index:21;display:none;align-items:center;gap:12px;
  pointer-events:auto;
}
.breadcrumb.show{display:flex;animation:fadeUp .5s ease}
.bc-home{
  background:rgba(7,6,12,.5);border:1px solid var(--line);border-radius:30px;
  color:var(--champagne);font-family:var(--font-body);font-size:10px;letter-spacing:.3em;
  text-indent:.3em;padding:9px 18px;cursor:pointer;backdrop-filter:blur(10px);transition:.3s;
}
.bc-home:hover{border-color:var(--champagne);background:rgba(233,211,181,.08)}
.bc-sep{color:var(--mist);opacity:.5}
.bc-now{font-family:var(--font-serif-kr);font-size:14px;letter-spacing:.14em;color:var(--mist)}
.collection{
  position:fixed;left:0;right:0;bottom:0;z-index:20;
  padding:0 44px 30px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
  pointer-events:none;
}
.col-left{pointer-events:auto}
.col-eyebrow{font-size:10px;letter-spacing:.44em;color:var(--mist);margin-bottom:14px}
.cards{display:flex;gap:14px;flex-wrap:wrap}
.card{
  display:flex;flex-direction:column;gap:5px;text-align:left;
  background:rgba(7,6,12,.5);border:1px solid var(--line);border-radius:18px;
  padding:16px 22px;cursor:pointer;backdrop-filter:blur(12px);transition:.35s;
  color:inherit;font-family:inherit;min-width:185px;
}
.card:hover{border-color:var(--champagne);transform:translateY(-5px);box-shadow:0 16px 44px rgba(0,0,0,.55)}
.card .no{font-size:9px;letter-spacing:.4em;color:var(--ember)}
.card .name{font-family:var(--font-serif);font-style:italic;font-size:19px;letter-spacing:.12em;color:var(--champagne)}
.card .sub{font-size:11px;color:var(--mist);letter-spacing:.04em}
.card.soon{opacity:.45;cursor:default}
.card.soon:hover{transform:none;border-color:var(--line);box-shadow:none}

.hint{pointer-events:auto;text-align:right;font-size:10px;letter-spacing:.34em;color:var(--mist);opacity:.65;line-height:2}

/* ── 상세 모달 ─────────────────────────── */
#detail{
  position:fixed;inset:0;z-index:50;display:none;align-items:stretch;
  background:rgba(6,5,10,.93);backdrop-filter:blur(12px);
}
#detail.open{display:flex;animation:detailIn .7s cubic-bezier(.2,.8,.2,1)}
@keyframes detailIn{from{opacity:0}to{opacity:1}}
.detail-inner{
  display:grid;grid-template-columns:1.25fr 1fr;width:100%;height:100%;
  padding:clamp(24px,5vh,64px) clamp(24px,5vw,80px);gap:clamp(28px,4vw,70px);
  overflow:hidden;
}
.detail-close{
  position:absolute;top:30px;right:40px;z-index:5;
  background:none;border:1px solid var(--line);color:var(--champagne);
  border-radius:40px;padding:11px 24px;font-size:10px;letter-spacing:.4em;text-indent:.4em;
  cursor:pointer;font-family:var(--font-body);transition:.3s;
}
.detail-close:hover{border-color:var(--champagne);background:rgba(233,211,181,.08)}

.d-media{display:flex;align-items:center;justify-content:center;min-width:0}
.d-video-frame{
  position:relative;width:100%;border-radius:18px;overflow:hidden;
  border:1px solid var(--line);background:#000;
  box-shadow:0 40px 90px rgba(0,0,0,.7);
  animation:mediaIn .9s cubic-bezier(.2,.8,.2,1) .15s both;
}
@keyframes mediaIn{from{opacity:0;transform:translateY(34px) scale(.97)}to{opacity:1;transform:none}}
.d-video-frame video{display:block;width:100%;aspect-ratio:16/9;object-fit:contain;outline:none;background:#000}
.d-coords{
  position:absolute;left:18px;top:16px;z-index:3;
  font-size:9px;letter-spacing:.32em;color:rgba(233,211,181,.85);
  background:rgba(7,6,12,.55);border:1px solid var(--line);
  padding:7px 13px;border-radius:30px;backdrop-filter:blur(6px);pointer-events:none;
}

/* 영상 준비중 플레이스홀더 */
.d-video-soon{
  width:100%;aspect-ratio:16/9;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:
    radial-gradient(60% 60% at 50% 40%, rgba(96,52,90,.22), transparent 70%),
    linear-gradient(160deg,#100a18,#080610);
}
.d-video-soon .soon-mark{
  font-size:30px;color:var(--champagne);opacity:.85;
  animation:soonPulse 3s ease-in-out infinite;
}
@keyframes soonPulse{0%,100%{opacity:.4;transform:scale(.95)}50%{opacity:.9;transform:scale(1.05)}}
.d-video-soon .soon-t{font-family:var(--font-body);font-size:11px;letter-spacing:.5em;text-indent:.5em;color:var(--champagne)}
.d-video-soon .soon-s{font-family:var(--font-serif-kr);font-size:13px;letter-spacing:.1em;color:var(--mist)}

.d-info{display:flex;flex-direction:column;justify-content:center;min-width:0;overflow-y:auto;
  scrollbar-width:none}
.d-info::-webkit-scrollbar{display:none}
.d-info > *{animation:fadeUp .8s cubic-bezier(.2,.8,.2,1) both}
.d-info > *:nth-child(1){animation-delay:.25s}
.d-info > *:nth-child(2){animation-delay:.33s}
.d-info > *:nth-child(3){animation-delay:.41s}
.d-info > *:nth-child(4){animation-delay:.49s}
.d-info > *:nth-child(5){animation-delay:.57s}
.d-info > *:nth-child(6){animation-delay:.65s}

.d-eyebrow{font-size:10px;letter-spacing:.46em;color:var(--ember);margin-bottom:16px}
.d-title{font-family:var(--font-display);font-size:clamp(38px,4.6vw,62px);letter-spacing:.14em;color:var(--champagne);line-height:1.05;font-weight:400}
.d-tagline{font-family:var(--font-serif-kr);font-style:normal;font-weight:400;font-size:clamp(15px,1.5vw,19px);color:var(--mist);margin-top:14px;letter-spacing:.14em}
.d-story{font-family:var(--font-serif-kr);font-weight:300;font-size:14px;line-height:2.1;color:#cfc8d6;margin-top:26px;word-break:keep-all;max-width:52ch}

/* 향 피라미드 */
.pyramid{margin-top:34px;display:flex;flex-direction:column;gap:0}
.note-row{display:grid;grid-template-columns:92px 1fr;gap:18px;align-items:center;
  padding:15px 0;border-bottom:1px solid var(--line)}
.note-row:first-child{border-top:1px solid var(--line)}
.note-k{font-size:9.5px;letter-spacing:.34em;color:var(--ember)}
.note-v{font-size:14px;color:#eee;font-weight:300;letter-spacing:.02em}
.note-bar{grid-column:2;height:1px;background:linear-gradient(90deg,var(--champagne),transparent);
  transform-origin:left;transform:scaleX(0);transition:transform 1.2s cubic-bezier(.2,.8,.2,1) .6s}
#detail.open .note-bar{transform:scaleX(var(--w))}

/* 가격 / CTA */
.d-buy{margin-top:34px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.price{font-family:var(--font-serif);font-size:24px;color:var(--champagne);letter-spacing:.04em}
.price small{font-size:11px;color:var(--mist);letter-spacing:.2em;margin-left:8px;font-family:var(--font-body)}
.btn-buy{
  background:var(--champagne);color:#181018;border:none;border-radius:40px;
  padding:15px 38px;font-family:var(--font-body);font-weight:600;font-size:12px;
  letter-spacing:.34em;text-indent:.34em;cursor:pointer;transition:.35s;
}
.btn-buy:hover{background:#f6e6cd;box-shadow:0 10px 36px rgba(233,211,181,.3);transform:translateY(-2px)}

/* 토스트 */
.toast{
  position:fixed;bottom:42px;left:50%;transform:translate(-50%,20px);z-index:70;
  background:rgba(10,8,16,.92);border:1px solid var(--line);border-radius:40px;
  padding:14px 30px;font-size:12px;letter-spacing:.14em;color:var(--champagne);
  opacity:0;pointer-events:none;transition:.45s;backdrop-filter:blur(14px);
}
.toast.show{opacity:1;transform:translate(-50%,0)}

/* ── 반응형 ───────────────────────────── */
@media (max-width:920px){
  .hud-top{padding:22px 20px;flex-wrap:wrap;gap:14px}
  .brand h1{font-size:16px;letter-spacing:.3em}
  .search-box{min-width:0;width:min(62vw,250px)}
  .collection{padding:0 16px 18px}
  .hint{display:none}
  .breadcrumb{left:16px;top:auto;bottom:150px}
  .cards{flex-wrap:nowrap;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
  .cards::-webkit-scrollbar{display:none}
  .card{min-width:160px;flex:0 0 auto;padding:13px 17px}
  .marker-country .tag{font-size:11px;letter-spacing:.18em;padding:7px 13px}
  .marker-country .tag i{display:none}
  .detail-inner{grid-template-columns:1fr;overflow-y:auto;gap:26px;
    padding:80px 22px 50px;align-content:start}
  .d-info{overflow:visible;justify-content:flex-start}
  .detail-close{top:20px;right:20px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="vignette"></div>
<div class="grain"></div>

<!-- ────── 인트로 ────── -->
<div id="intro">
  <div class="intro-title" id="introTitle">NUMBER OF TWILIGHT</div>
  <div class="intro-line"></div>
  <p class="intro-sub">scent of the world · 여행의 기억을 향으로</p>
  <button class="intro-enter" onclick="enterSite()">ENTER THE WORLD</button>
</div>

<!-- ────── 메인 스테이지 ────── -->
<div id="stage">
  <div id="globeViz"></div>

  <header class="hud-top">
    <div class="brand">
      <h1>NUMBER OF TWILIGHT</h1>
      <p>SCENT OF THE WORLD GAZE</p>
    </div>
    <div class="hud-right">
      <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" aria-label="배경 음악 켜기/끄기">
        <i></i><i></i><i></i>
      </button>
      <div class="search-wrap">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e9d3b5" stroke-width="1.6">
            <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input id="searchInput" type="text" placeholder="나라 또는 도시를 검색하세요"
                 autocomplete="off" oninput="renderSuggest()" onkeydown="handleKey(event)"
                 onfocus="renderSuggest()">
        </div>
        <div class="suggest" id="suggest"></div>
      </div>
    </div>
  </header>

  <nav class="breadcrumb" id="breadcrumb"></nav>

  <div class="collection">
    <div class="col-left">
      <p class="col-eyebrow" id="colEyebrow">EXPLORE BY COUNTRY</p>
      <div class="cards" id="cards"></div>
    </div>
    <div class="hint">
      DRAG TO EXPLORE<br>CLICK A COUNTRY TO ENTER
    </div>
  </div>
</div>

<!-- ────── 상세 모달 ────── -->
<div id="detail" role="dialog" aria-modal="true">
  <button class="detail-close" onclick="closeDetail()">CLOSE ✕</button>
  <div class="detail-inner">
    <div class="d-media">
      <div class="d-video-frame">

</div>

<div class="toast" id="toast"></div>
<div id="youtube-bgm-player" style="position:absolute;width:0;height:0;left:-9999px"></div>

<script>
/* ══════════ 데이터 ══════════
   영상 추가 방법: 각 향수의 video 값에 파일명을 넣으면 됩니다.
   video를 비워두면('') 상세 화면에 "영상 준비중 ✦" 플레이스홀더가 표시됩니다. */
const perfumes = [
  {
    id:'kanazawa',
    lat:36.5613, lng:136.6562,
    name:'KANAZAWA', country:'JAPAN', no:'MEMORY 01',
    keywords:['가나자와','일본','japan','kanazawa','jp'],
    tagline:'바람을 타고 오는 은은한 향',
    story:'비가 갓 지나간 겐로쿠엔의 아침. 이끼 위에 맺힌 물방울과 차실에서 새어 나오는 화이트 티의 온기가 바람에 실려 옵니다. 가나자와의 고요한 골목을 걷던 그날의 공기를, 한 병에 담았습니다.',
    video:'KakaoTalk_20260225_175616729.mp4',
    bgm:'dFlDRhxR4EQ',
    price:'₩128,000', size:'EAU DE PARFUM · 50ml',
    notes:[
      {k:'TOP', v:'비에 젖은 이끼, 베르가못', w:.95},
      {k:'MIDDLE', v:'은은한 매화, 화이트 티', w:.7},
      {k:'BASE', v:'샌달우드, 흙내음', w:.45},
    ]
  },
  {
    id:'fukuoka',
    lat:33.5904, lng:130.3210,
    name:'FUKUOKA', country:'JAPAN', no:'MEMORY 05',
    keywords:['후쿠오카','일본','japan','fukuoka','momochi','모모치','jp'],
    tagline:'모모치 해변, 비눗방울이 흩날리던 결혼식',
    story:'모모치 해변의 새하얀 교회. 식이 끝나고 문이 열리면 바다 바람을 타고 수천 개의 비눗방울이 햇살에 부서집니다. 면사포처럼 투명한 그 순간, 가장 깨끗하고 영롱한 공기를 향으로 옮겼습니다.',
    video:'',
    bgm:'dFlDRhxR4EQ',
    price:'₩128,000', size:'EAU DE PARFUM · 50ml',
    notes:[
      {k:'TOP', v:'알데하이드, 페어 블라썸, 화이트 프리지아', w:.95},
      {k:'MIDDLE', v:'화이트 로즈, 은방울꽃, 코튼 플라워', w:.72},
      {k:'BASE', v:'화이트 머스크, 블론드 우드, 스웨이드', w:.48},
    ]
  },
  {
    id:'jiufen',
    lat:25.1098, lng:121.8452,
    name:'JIUFEN', country:'TAIWAN', no:'MEMORY 02',
    keywords:['지우펀','대만','타이완','taiwan','jiufen','tw'],
    tagline:'홍등이 수놓은 밤골목의 아련한 향',
    story:'해가 지면 지우펀의 계단길에는 수백 개의 홍등이 켜집니다. 찻집에서 우려낸 우롱차의 깊은 향과 골목 끝에서 피어오르는 인센스의 연기. 안개 낀 산마을의 밤을 그대로 옮겨 담은 향입니다.',
    video:'Jiufen_Perfume_Ad_Cinematic_Scene.mp4',
    bgm:'JBGhG0M11_8',
    price:'₩128,000', size:'EAU DE PARFUM · 50ml',
    notes:[
      {k:'TOP', v:'스파이시 페퍼, 만다린', w:.9},
      {k:'MIDDLE', v:'오리엔탈 인센스, 우롱차', w:.75},
      {k:'BASE', v:'다크 머스크, 패출리', w:.5},
    ]
  },
  {
    id:'phuquoc',
    lat:10.2899, lng:103.9840,
    name:'PHÚ QUỐC', country:'VIETNAM', no:'MEMORY 04',
    keywords:['푸꾸옥','베트남','vietnam','phuquoc','phu quoc','vn'],
    tagline:'키스 오브 더 씨쇼, 여름밤의 몽환',
    story:'해가 진 푸꾸옥의 밤바다. 짠 내음이 밴 따뜻한 바람과 어둠 속에서 흔들리는 흰 꽃의 향기. 키스 오브 더 씨쇼를 바라보던 그 여름밤의 몽환적인 공기를, 한 병에 가두었습니다.',
    video:'',
    bgm:'JBGhG0M11_8',
    price:'₩128,000', size:'EAU DE PARFUM · 50ml',
    notes:[
      {k:'TOP', v:'솔티 씨 미스트, 베르가못, 그린 만다린', w:.92},
      {k:'MIDDLE', v:'야간 튜베로즈, 워터 자스민, 라임 블라썸', w:.78},
      {k:'BASE', v:'코코넛 우드, 화이트 머스크, 앰버', w:.5},
    ]
  }
];

/* 국가 정의 — 지구본 1단계(국가 마커)에서 사용.
   새 나라를 추가할 땐 여기에 한 줄, 그리고 위 perfumes에 country를 맞춰 넣으면 됩니다. */
const countries = [
  {id:'JAPAN',   label:'JAPAN',   ko:'일본',   flag:'🇯🇵', lat:36.5, lng:138.0, zoom:1.15},
  {id:'TAIWAN',  label:'TAIWAN',  ko:'대만',   flag:'🇹🇼', lat:23.7, lng:121.0, zoom:0.9},
  {id:'VIETNAM', label:'VIETNAM', ko:'베트남', flag:'🇻🇳', lat:14.0, lng:108.3, zoom:1.35},
];
function citiesOf(countryId){ return perfumes.filter(p => p.country === countryId); }

const comingSoon = [{no:'MEMORY ··', name:'COMING SOON', sub:'다음 여행지를 조향 중입니다'}];

/* ══════════ 인트로 ══════════ */
(function buildIntro(){
  const el = document.getElementById('introTitle');
  const text = el.textContent; el.textContent = '';
  [...text].forEach((ch,i)=>{
    const s = document.createElement('span');
    s.style.setProperty('--i', i);
    s.innerHTML = ch === ' ' ? '&nbsp;' : ch;
    el.appendChild(s);
  });
})();

let entered = false;
function enterSite(){
  if (entered) return; entered = true;
  document.getElementById('intro').classList.add('done');
  document.getElementById('stage').classList.add('show');
  // 입장 카메라 무브
  setTimeout(()=>{ if (world) world.pointOfView({lat:28, lng:128, altitude: window.innerWidth < 920 ? 2.9 : 2.1}, 2600); }, 200);
}

/* ══════════ BGM ══════════ */
let bgmPlayer = null, soundOn = false;
function onYouTubeIframeAPIReady(){
  bgmPlayer = new YT.Player('youtube-bgm-player', {
    height:'1', width:'1',
    playerVars:{autoplay:0, controls:0, rel:0}
  });
}
function toggleSound(){
  soundOn = !soundOn;
  document.getElementById('soundToggle').classList.toggle('on', soundOn);
  if (!bgmPlayer) return;
  if (soundOn){
    if (typeof bgmPlayer.getVideoData === 'function' && bgmPlayer.getVideoData().video_id){
      bgmPlayer.playVideo();
    } else {
      bgmPlayer.loadVideoById({videoId: perfumes[0].bgm});
    }
    toast('배경 음악이 흐릅니다 🌙');
  } else {
    bgmPlayer.pauseVideo();
  }
}
function playBgmFor(p){
  if (!soundOn || !bgmPlayer || typeof bgmPlayer.loadVideoById !== 'function') return;
  bgmPlayer.loadVideoById({videoId: p.bgm});
}

/* ══════════ 지구본 ══════════ */
let viewLevel = 'world';      // 'world' = 국가 마커, 'country' = 도시 마커
let activeCountry = null;

// 국가 마커 (1단계)
const countryMarkerHtml = (c)=>{
  const el = document.createElement('div');
  el.className = 'marker marker-country';
  const n = citiesOf(c.id).length;
  el.innerHTML = `<div class="ring"></div>
    <span class="tag"><b>${c.flag}</b> ${c.label}<i>${n} scent${n>1?'s':''}</i></span>`;
  el.onclick = (e)=>{ e.stopPropagation(); enterCountry(c); };
  return el;
};
// 도시 마커 (2단계)
const cityMarkerHtml = (d)=>{
  const el = document.createElement('div');
  el.className = 'marker marker-city';
  el.innerHTML = `<div class="ring"></div><span class="tag">${d.name}</span>`;
  el.onclick = (e)=>{ e.stopPropagation(); flyAndOpen(d); };
  return el;
};

const TEX = 'https://cdn.jsdelivr.net/npm/three-globe@2.45.2/example/img';
let world = null;

try {
  if (typeof Globe === 'undefined') throw new Error('globe.gl not loaded');

  world = Globe()
    (document.getElementById('globeViz'))
    .globeImageUrl(TEX + '/earth-night.jpg')
    .bumpImageUrl(TEX + '/earth-topology.png')
    .backgroundColor('rgba(0,0,0,0)')
    .showAtmosphere(true)
    .atmosphereColor('#e9d3b5')
    .atmosphereAltitude(0.16)
    .htmlElementsData(countries)
    .htmlElement(countryMarkerHtml)
    .htmlAltitude(0.012)
    .ringsData(countries)
    .ringColor(()=> t => `rgba(233,211,181,${Math.max(0, .5*(1-t))})`)
    .ringMaxRadius(3.2)
    .ringPropagationSpeed(1.0)
    .ringRepeatPeriod(2000);

  world.pointOfView({lat:30, lng:130, altitude: window.innerWidth < 920 ? 3.4 : 2.6});
  world.renderer().setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75)); // 고해상도 화면 렉 방지
  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.35;
  world.controls().enableDamping = true;

  window.addEventListener('resize', ()=>{
    world.width(window.innerWidth).height(window.innerHeight);
  });
} catch (err) {
  console.error('Globe init failed:', err);
  document.getElementById('globeViz').innerHTML =
    `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      color:#a89fb5;font-size:12px;letter-spacing:.2em;text-align:center;line-height:2;padding:0 30px">
      지구본을 불러오지 못했어요.<br>네트워크 확인 후 새로고침 해주세요 🌙</div>`;
}

/* ── 드릴다운: 국가 진입 / 전체 복귀 ── */
function enterCountry(c){
  activeCountry = c;
  viewLevel = 'country';
  updateBreadcrumb();
  if (world){
    world.controls().autoRotate = false;
    world.htmlElementsData([]).ringsData([]);       // 마커 정리 후
    world.pointOfView({lat:c.lat, lng:c.lng, altitude: window.innerWidth < 920 ? 1.9 : 1.35}, 1500);
    const cities = citiesOf(c.id);
    setTimeout(()=>{
      world.htmlElementsData(cities).htmlElement(cityMarkerHtml)
           .ringsData(cities)
           .ringColor(()=> t => `rgba(233,211,181,${Math.max(0,.55*(1-t))})`)
           .ringMaxRadius(2.4).ringPropagationSpeed(0.9).ringRepeatPeriod(1600);
    }, 760);
  }
  renderCards();
}
function backToWorld(){
  activeCountry = null;
  viewLevel = 'world';
  updateBreadcrumb();
  if (world){
    world.htmlElementsData([]).ringsData([]);
    world.pointOfView({lat:30, lng:130, altitude: window.innerWidth < 920 ? 3.4 : 2.6}, 1400);
    setTimeout(()=>{
      world.htmlElementsData(countries).htmlElement(countryMarkerHtml)
           .ringsData(countries)
           .ringColor(()=> t => `rgba(233,211,181,${Math.max(0,.5*(1-t))})`)
           .ringMaxRadius(3.2).ringPropagationSpeed(1.0).ringRepeatPeriod(2000);
      world.controls().autoRotate = true;
    }, 720);
  }
  renderCards();
}
function updateBreadcrumb(){
  const bc = document.getElementById('breadcrumb');
  if (viewLevel === 'world'){ bc.classList.remove('show'); bc.innerHTML=''; return; }
  bc.classList.add('show');
  bc.innerHTML =
    `<button class="bc-home" onclick="backToWorld()">✦ WORLD</button>
     <span class="bc-sep">/</span>
     <span class="bc-now">${activeCountry.flag} ${activeCountry.label}</span>`;
}

/* ══════════ 검색 + 자동완성 ══════════ */
const input = document.getElementById('searchInput');
const suggest = document.getElementById('suggest');

function matchList(q){
  q = q.trim().toLowerCase();
  if (!q) return perfumes;
  return perfumes.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.country.toLowerCase().includes(q) ||
    p.keywords.some(k => k.toLowerCase().includes(q))
  );
}
function renderSuggest(){
  const list = matchList(input.value);
  suggest.classList.add('open');
  if (!list.length){
    suggest.innerHTML = `<div class="suggest-empty">아직 조향되지 않은 지역이에요 🌙<br>다음 여행지로 검토해 볼게요.</div>`;
    return;
  }
  suggest.innerHTML = list.map(p=>`
    <div class="suggest-item" onclick="pickSuggest('${p.id}')">
      <span class="nm">${p.name}</span><span class="cc">${p.country}</span>
    </div>`).join('');
}
function pickSuggest(id){
  const p = perfumes.find(x=>x.id===id);
  input.value = p.name;
  suggest.classList.remove('open');
  // 검색으로 바로 도시를 고르면, 해당 국가 단계로 맞춰둔 뒤 상세를 연다
  const c = countries.find(x=>x.id===p.country);
  if (c){ activeCountry = c; viewLevel = 'country'; updateBreadcrumb(); renderCards(); }
  flyAndOpen(p);
}
function handleKey(e){
  if (e.key === 'Enter'){
    const list = matchList(input.value);
    if (list.length){ pickSuggest(list[0].id); }
    else toast('아직 조향되지 않은 지역이에요 🌙');
  }
  if (e.key === 'Escape') suggest.classList.remove('open');
}
document.addEventListener('click', (e)=>{
  if (!e.target.closest('.search-wrap')) suggest.classList.remove('open');
});

/* ══════════ 비행 → 상세 오픈 ══════════ */
let flying = false;
function flyAndOpen(p){
  if (flying) return; flying = true;
  playBgmFor(p);
  if (world){
    world.controls().autoRotate = false;
    world.pointOfView({lat:p.lat, lng:p.lng, altitude: window.innerWidth < 920 ? 1.6 : 1.05}, 1700);
    setTimeout(()=>{ openDetail(p); flying = false; }, 1850);
  } else {
    openDetail(p); flying = false;
  }
}

/* ══════════ 상세 모달 ══════════ */
const detail = document.getElementById('detail');
const dVideo = document.getElementById('dVideo');

function openDetail(p){
  document.getElementById('dEyebrow').textContent = `${p.no} · ${p.country}`;
  document.getElementById('dTitle').textContent = p.name;
  document.getElementById('dTagline').textContent = p.tagline;
  document.getElementById('dStory').textContent = p.story;
  document.getElementById('dCoords').textContent =
    `${Math.abs(p.lat).toFixed(2)}°${p.lat>=0?'N':'S'}  ${Math.abs(p.lng).toFixed(2)}°${p.lng>=0?'E':'W'}`;
  document.getElementById('dPrice').innerHTML = `${p.price}<small>${p.size}</small>`;
  document.getElementById('dPyramid').innerHTML = p.notes.map(n=>`
    <div class="note-row">
      <span class="note-k">${n.k} NOTE</span>
      <span class="note-v">${n.v}</span>
      <span class="note-bar" style="--w:${n.w}"></span>
    </div>`).join('');

  if (bgmPlayer && typeof bgmPlayer.pauseVideo === 'function') bgmPlayer.pauseVideo();

  const soon = document.getElementById('dVideoSoon');
  if (p.video){                              // 영상 파일이 있으면 재생
    soon.style.display = 'none';
    dVideo.style.display = 'block';
    dVideo.src = p.video;
    detail.classList.add('open');
    dVideo.play().catch(()=>{});
  } else {                                   // 없으면 "영상 준비중" 플레이스홀더
    dVideo.removeAttribute('src'); dVideo.load();
    dVideo.style.display = 'none';
    soon.style.display = 'flex';
    detail.classList.add('open');
  }
  currentPerfume = p;
}
let currentPerfume = null;

function closeDetail(){
  detail.classList.remove('open');
  dVideo.pause(); dVideo.removeAttribute('src'); dVideo.load();
  if (soonEl()) soonEl().style.display = 'none';
  if (soundOn && bgmPlayer && typeof bgmPlayer.playVideo === 'function') bgmPlayer.playVideo();
  // 도시 상세에서 나오면 그 국가 화면을 유지(자동회전은 전체보기에서만)
  if (world){
    world.controls().autoRotate = (viewLevel === 'world');
    if (viewLevel === 'country' && activeCountry){
      // 검색을 통해 바로 들어온 경우 도시 마커가 없을 수 있어 보강
      const cities = citiesOf(activeCountry.id);
      world.htmlElementsData(cities).htmlElement(cityMarkerHtml)
           .ringsData(cities)
           .ringColor(()=> t => `rgba(233,211,181,${Math.max(0,.55*(1-t))})`)
           .ringMaxRadius(2.4).ringPropagationSpeed(0.9).ringRepeatPeriod(1600);
      world.pointOfView({lat:activeCountry.lat, lng:activeCountry.lng,
        altitude: window.innerWidth < 920 ? 1.9 : 1.35}, 1200);
    }
  }
}
function soonEl(){ return document.getElementById('dVideoSoon'); }
detail.addEventListener('click', e=>{ if (e.target === detail) closeDetail(); });
document.addEventListener('keydown', e=>{
  if (e.key === 'Escape' && detail.classList.contains('open')) closeDetail();
});

function addToCart(){
  toast(`${currentPerfume ? currentPerfume.name : ''} — 곧 온라인 스토어가 오픈됩니다 ✦`);
}

/* ══════════ 컬렉션 카드 (드릴다운 반영) ══════════ */
function renderCards(){
  const wrap = document.getElementById('cards');
  const eyebrow = document.getElementById('colEyebrow');

  if (viewLevel === 'world'){
    eyebrow.textContent = 'EXPLORE BY COUNTRY';
    wrap.innerHTML =
      countries.map(c=>{
        const n = citiesOf(c.id).length;
        return `<button class="card" onclick="enterCountry(countries.find(x=>x.id==='${c.id}'))">
          <span class="no">${c.flag} ${c.label}</span>
          <span class="name">${c.ko}</span>
          <span class="sub">${n}개의 향 컬렉션</span>
        </button>`;
      }).join('')
      + comingSoon.map(c=>`
        <div class="card soon">
          <span class="no">${c.no}</span>
          <span class="name">${c.name}</span>
          <span class="sub">${c.sub}</span>
        </div>`).join('');
  } else {
    eyebrow.textContent = `${activeCountry.flag} ${activeCountry.label} COLLECTION`;
    wrap.innerHTML = citiesOf(activeCountry.id).map(p=>`
      <button class="card" onclick="flyAndOpen(perfumes.find(x=>x.id==='${p.id}'))">
        <span class="no">${p.no}</span>
        <span class="name">${p.name}</span>
        <span class="sub">${p.tagline}</span>
      </button>`).join('');
  }
}
renderCards();

/* ══════════ 토스트 ══════════ */
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
